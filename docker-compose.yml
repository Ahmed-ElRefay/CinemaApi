services:
  postgres:
    image: postgres:16
    container_name: cinema-db
    environment:
      POSTGRES_DB: cinema
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: cinema
    ports:
      - "5432:5432"
    volumes:
      - cinema-pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
volumes:
  cinema-pgdata: